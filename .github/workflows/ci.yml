name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Linux: CPU-only tests (no Metal) ──────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ASan + UBSan
            cmake_flags: "-fsanitize=address,undefined"
            build_dir: build-asan
          - name: TSan
            cmake_flags: "-fsanitize=thread"
            build_dir: build-tsan
    name: "Linux (${{ matrix.name }})"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake catch2 libcatch2-dev

      - name: Configure
        run: cmake -B ${{ matrix.build_dir }} -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}"

      - name: Build
        run: cmake --build ${{ matrix.build_dir }}

      - name: Test
        run: cd ${{ matrix.build_dir }} && ctest --output-on-failure

  # ── macOS: full suite including Metal ─────────────────────────────────────
  macos:
    runs-on: macos-14  # M1-based runner — has Metal GPU
    strategy:
      matrix:
        include:
          - name: Debug
            build_type: Debug
            cmake_flags: ""
            build_dir: build-debug
          - name: ASan + UBSan
            build_type: Debug
            cmake_flags: "-fsanitize=address,undefined"
            build_dir: build-asan
          - name: Release
            build_type: Release
            cmake_flags: ""
            build_dir: build-release
    name: "macOS (${{ matrix.name }})"
    steps:
      - uses: actions/checkout@v4

      - name: Install Catch2
        run: brew install catch2

      - name: Configure
        run: >
          cmake -B ${{ matrix.build_dir }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}"

      - name: Build
        run: cmake --build ${{ matrix.build_dir }}

      - name: Test (all including Metal)
        run: cd ${{ matrix.build_dir }} && ctest --output-on-failure

      - name: Benchmarks
        if: matrix.build_type == 'Release'
        run: |
          cd ${{ matrix.build_dir }}
          ./bench_queue
          ./bench_deque
          ./bench_allocator
          ./bench_scheduler
          ./bench_metal
